<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script>
function confirmDelete(jobId) {
    if (confirm("Are you sure you want to delete this hiring drive? This action cannot be undone.")) {
        window.location.href = "/delete_job/" + jobId;
    }
}
</script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Dashboard</h1>

    <div class="flex gap-4">
        <a href="/" class="text-blue-500">+ New Job</a>
        <a href="/logout" class="text-red-500">Logout</a>
    </div>
</div>

<!-- JOB CARDS -->
<div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for job in jobs %}
<div class="bg-white p-5 rounded-2xl shadow hover:shadow-xl transition relative">

<!-- DELETE BUTTON -->
<button onclick="confirmDelete('{{ job.id }}')"
class="absolute top-3 right-3 text-red-500 hover:text-red-700 text-sm">
Delete
</button>

<a href="/job/{{ job.id }}">
    <h2 class="text-lg font-bold text-gray-800 mb-2">
        {{ job.title }}
    </h2>

    <p class="text-gray-500 text-sm">
        View Candidates →
    </p>
</a>

</div>
{% endfor %}

</div>


</body>
</html>
