<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Page header -->
<div class="max-w-6xl mx-auto px-4 mt-8">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900">{{ job.title }}</h1>
            <p class="mt-1 text-sm text-gray-500">Candidates for this role</p>
        </div>

        <div class="flex items-center gap-3">
            <a href="/dashboard" class="text-blue-500 hover:underline">← Back</a>

            <a href="{{ url_for('refresh', job_id=job.id) }}" class="inline-block">
                <button class="px-4 py-2 rounded-lg text-white font-semibold shadow hover:shadow-lg transition"
                                style="background: linear-gradient(45deg, #00bcd4, #2196f3);">
                    🔄 Sync Latest Applications
                </button>
            </a>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white shadow p-4 rounded-lg mb-6">
        <h2 class="text-lg font-bold text-blue-600">Candidates</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for c in candidates %}
<a href="/candidate/{{ c.id }}">
<div class="bg-white p-5 rounded-2xl shadow hover:shadow-xl transition">

<h2 class="font-bold text-gray-800">{{ c.name }}</h2>

<div class="mt-2">
<span class="text-sm text-gray-500">Score:</span>
<span class="text-green-600 font-bold">{{ c.score }}</span>
</div>

<div class="mt-3">
<span class="text-blue-500 text-sm">View Details →</span>
</div>

</div>
</a>
{% endfor %}

</div>

</body>
</html>
